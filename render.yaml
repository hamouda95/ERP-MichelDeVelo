services:
  # Backend Django Service
  - type: web
    name: erp-micheldevelo
    env: python
    repo: https://github.com/hamouda95/ERP-MichelDeVelo.git
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bike_erp.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: erp-micheldevelo.onrender.com,.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.16

  # Frontend React Service  
  - type: web
    name: erp-micheldevelo-frontend
    env: static
    repo: https://github.com/hamouda95/ERP-MichelDeVelo.git
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://erp-micheldevelo.onrender.com/api
      - key: REACT_APP_ENV
        value: production

# Database Service
databases:
  - name: erp-db
    databaseName: erp_db
